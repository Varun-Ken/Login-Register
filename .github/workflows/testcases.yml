name: Sprint Master Test Cases

on:
  pull_request:
    branches:
      - V_Sprint_Master
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # Install Server Dependencies
      - name: Install Server Dependencies
        working-directory: Server
        run: npm install

      # Run Sample Test Cases
      - name: Run Sample Tests
        id: sampletests
        run: |
          echo "Running sample test cases..."

          TEST1="PASS"
          TEST2="fail"
          TEST3="PASS"

          if [ "$TEST1" != "PASS" ]; then
            echo "Test Case 1 Failed"
            exit 1
          fi

          if [ "$TEST2" != "PASS" ]; then
            echo "Test Case 2 Failed"
            exit 1
          fi

          if [ "$TEST3" != "PASS" ]; then
            echo "Test Case 3 Failed"
            exit 1
          fi

          echo "All Sample Tests Passed"

      # Generate Report
      - name: Generate Test Report
        if: always()
        run: |
          echo "GitHub CI Execution Report" > test-report.txt
          echo "Repository: ${{ github.repository }}" >> test-report.txt
          echo "Branch: ${{ github.ref_name }}" >> test-report.txt
          echo "Triggered By: ${{ github.actor }}" >> test-report.txt
          echo "Result: ${{ job.status }}" >> test-report.txt

      # Upload report
      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test-report.txt

      # Send Email
      - name: Send Email Report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: CI Result - ${{ job.status }}
          to: aaaare653tp6pq45oyh6pxpykm@spantech.slack.com
          from: GitHub CI
          body: |
            GitHub CI Execution Report

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Triggered By: ${{ github.actor }}

            Test Result: ${{ job.status }}

            Run Link:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
